name: Terraform Plan

on:
  pull_request:
    branches:
      - main

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  TF_VAR_cloud_id: ${{ secrets.YC_CLOUD_ID }}
  TF_VAR_folder_id: ${{ secrets.YC_FOLDER_ID }}
  TF_VAR_env: dev
  TF_VAR_project: apps-deployer
  TF_VAR_domain_zone: ${{ secrets.DOMAIN_ZONE }}

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Write YC SA key
        run: echo '${{ secrets.YC_SA_KEY }}' > key.json

      - name: Plan network
        working-directory: envs/dev/network
        run: |
          terraform init
          terraform plan

      - name: Plan k8s
        working-directory: envs/dev/k8s
        run: |
          terraform init
          terraform plan

      - name: Plan registry
        working-directory: envs/dev/registry
        run: |
          terraform init
          terraform plan

      - name: Plan dns
        working-directory: envs/dev/dns
        run: |
          terraform init
          terraform plan

      - name: Plan ci-cd
        working-directory: envs/dev/ci-cd
        run: |
          terraform init
          terraform plan
